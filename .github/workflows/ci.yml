name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tooling dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint shared utilities
        run: ruff check lnai/config.py lnai/data lnai/core/pricing.py lnai/experiments/aggregate_results.py lnai/experiments/deep_baselines.py lnai/experiments/grid_search.py lnai/experiments/informer_forecasting.py lnai/experiments/informer_valuation.py lnai/experiments/train_all_models.py tests

      - name: Run tests
        run: pytest
